<!DOCTYPE HTML>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('상품 상세')}"></head>

<body>
<div class="page-wrapper">

    <!-- Navbar -->
    <div th:insert="~{fragments/bodyHeader :: bodyHeader}"></div>

    <div class="container pdp-container">

        <!-- 브레드크럼 -->
        <nav class="pdp-breadcrumb">
            <a href="/shop/main">Home</a>

            <i class="fa fa-chevron-right"></i>
            <span th:text="${item.category}">카테고리</span>

            <i class="fa fa-chevron-right"></i>
            <span th:text="${item.itemTitle}">상품명</span>
        </nav>

        <!-- 메인 카드: 이미지 + 정보 -->
        <div class="pdp-main-card">
            <div class="row g-0">

                <!-- 왼쪽: 이미지 -->
                <div class="col-md-5">
                    <div class="pdp-image-area">
                        <div class="detail-image-wrap" th:if="${item.imageUrl}">
                            <img th:src="${item.imageUrl}" th:alt="${item.itemTitle}" loading="lazy"
                                 id="main-pdp-image">
                        </div>
                        <div class="product-card__no-img" th:if="${item.imageUrl == null}">
                            <i class="fa fa-image fa-3x"></i>
                        </div>

                        <!-- 썸네일 리스트 (imageUrlList 사용) -->
                        <div class="pdp-thumbnails-wrap"
                             th:if="${item.imageUrlList != null and not #lists.isEmpty(item.imageUrlList)}">
                            <div class="pdp-thumbnail-item"
                                 th:each="thumbUrl, iterStat : ${item.imageUrlList}"
                                 th:classappend="${thumbUrl == item.imageUrl} ? 'active' : ''"
                                 onclick="changeMainImage(this)">
                                <img th:src="${thumbUrl}" th:alt="${item.itemTitle} + ' thumbnail'">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 오른쪽: 상품 정보 -->
                <div class="col-md-7">
                    <div class="pdp-info-panel">

                        <span class="pdp-category-badge" th:text="${item.category}">카테고리</span>
                        <!-- 상품명 -->
                        <h1 class="pdp-title" th:text="${item.itemTitle}">상품명</h1>

                        <!-- 별점 + 리뷰 -->
                        <div class="pdp-rating-row">
              <span class="pdp-stars">
                <i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i>
                <i class="fa fa-star"></i><i class="fa fa-star-half-alt"></i>
              </span>
                            <span class="pdp-review-count"
                                  th:text="${#lists.size(replies)} + '개 리뷰'">0개 리뷰</span>
                            <span class="pdp-divider-dot">·</span>
                            <span class="pdp-sold-count">100+ 판매됨</span>
                        </div>

                        <!-- 가격 박스 -->
                        <div class="pdp-price-box">
              <span class="pdp-price"
                    th:text="${item.itemPrice != null ? '₩' + #numbers.formatInteger(item.itemPrice, 0, 'COMMA') : '무료'}">
              </span>
                            <span class="pdp-price-unit">원</span>
                        </div>

                        <div class="pdp-section-divider"></div>

                        <!-- 수량 선택 -->
                        <div class="pdp-option-row">
                            <span class="pdp-option-label">수량</span>
                            <div class="pdp-qty-control">
                                <button type="button" class="pdp-qty-btn" id="qtyMinus">
                                    <i class="fa fa-minus"></i>
                                </button>
                                <input type="number" class="pdp-qty-input" id="qtyInput" value="1" min="1" max="99">
                                <button type="button" class="pdp-qty-btn" id="qtyPlus">
                                    <i class="fa fa-plus"></i>
                                </button>
                            </div>
                            <span class="pdp-stock-info">재고 있음</span>
                        </div>

                        <div class="pdp-section-divider"></div>

                        <!-- 주문 버튼 -->
                        <div class="pdp-actions">
                            <button class="pdp-btn-order">
                                <i class="fa fa-shopping-bag me-2"></i>지금 주문하기
                            </button>
                            <button class="pdp-btn-cart">
                                <i class="fa fa-shopping-cart me-2"></i>장바구니 담기
                            </button>
                            <button class="pdp-btn-wish" title="찜하기">
                                <i class="fa fa-heart"></i>
                            </button>
                        </div>

                        <div class="pdp-section-divider"></div>

                        <!-- 배송/판매자 정보 -->
                        <ul class="pdp-meta-list">
                            <li>
                                <i class="fa fa-shipping-fast"></i>
                                <div>
                                    <strong>무료 배송</strong>
                                    <span>예상 도착: 3~5일 이내</span>
                                </div>
                            </li>
                            <li>
                                <i class="fa fa-undo-alt"></i>
                                <div>
                                    <strong>15일 무료 반품</strong>
                                    <span>구매일로부터 15일 이내</span>
                                </div>
                            </li>
                            <li>
                                <i class="fa fa-store"></i>
                                <div>
                                    <strong>판매자</strong>
                                    <span>So:0 Official Store</span>
                                </div>
                            </li>
                            <li>
                                <i class="fa fa-calendar-alt"></i>
                                <div>
                                    <strong>등록일</strong>
                                    <span th:text="${#dates.format(item.createdAt, 'yyyy-MM-dd')}"></span>
                                </div>
                            </li>
                        </ul>

                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 유사 상품 (Similar Items) ===== -->
        <div class="similar-section" th:if="${results != null and not #lists.isEmpty(results)}">
            <div class="container">
                <div class="section-label">
                    <i class="fa fa-magic"></i> 이 상품과 유사한 상품
                </div>
                <div class="scroll-container-wrap">
                    <button class="scroll-btn scroll-btn-left" id="scrollLeft">
                        <i class="fa fa-chevron-left"></i>
                    </button>
                    <div class="scroll-container" id="scrollWrapper">
                        <div class="scroll-card" th:each="result : ${results}">
                            <a th:href="@{/shop/detail/{itemId}(itemId=${result.itemId})}">
                                <div class="product-card">
                                    <div class="product-card__img-wrap">
                                        <img th:src="${result.imageUrl != null ? result.imageUrl : '/images/default.jpg'}"
                                             th:alt="${result.itemTitle != null ? result.itemTitle : '상품 이미지'}"
                                             loading="lazy">
                                    </div>
                                    <div class="product-card__body">
                                        <p class="product-card__title"
                                           th:text="${#strings.length(result.itemTitle) > 19 ? #strings.substring(result.itemTitle, 0, 19) + '...' : result.itemTitle}"></p>
                                        <p class="product-card__price"
                                           th:text="${result.itemPrice != null ? '₩' + #numbers.formatInteger(result.itemPrice, 0, 'COMMA') : '가격 없음'}"></p>
                                        <p class="product-card__similarity"
                                           th:text="${result.hammingDistance != null ? '유사도: ' + result.hammingDistance : ''}"></p>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                    <button class="scroll-btn scroll-btn-right" id="scrollRight">
                        <i class="fa fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== 상품 설명 섹션 ===== -->
        <div class="pdp-desc-card">
            <div class="pdp-tab-header">
                <span class="pdp-tab active">상품 설명</span>
                <span class="pdp-tab">상세 스펙</span>
            </div>
            <div class="pdp-desc-body">
                <p th:text="${item.itemContent}">상품 설명이 없습니다.</p>

                <div class="pdp-desc-gallery" th:if="${item.imageUrlList != null and not #lists.isEmpty(item.imageUrlList)}">
                    <div class="pdp-desc-gallery-item" th:each="imgUrl : ${item.imageUrlList}">
                        <img th:src="${imgUrl}" th:alt="${item.itemTitle}" loading="lazy">
                    </div>
                </div>

            </div>
        </div>

    </div><!-- /pdp-container -->


    <!-- ===== 댓글/리뷰 섹션 ===== -->
    <div class="container">
        <div class="comment-section">
            <h5 class="comment-section__title">
                <i class="fa fa-comment-dots me-2"></i>구매 리뷰
                <span class="pdp-review-badge"
                      th:text="${#lists.size(replies)} + '개'">0개</span>
            </h5>

            <!-- 댓글 작성 폼 -->
            <form class="comment-form"
                  th:action="@{/shop/saveReply/{id}(id=${postId})}"
                  th:object="${replyForm}"
                  method="post"
                  enctype="multipart/form-data">
                <div class="form-row">
                    <input type="text" name="replyWriter" placeholder="이름" required>
                    <input type="password" name="replyPassword" placeholder="비밀번호" required>
                </div>
                <textarea name="replyContent" rows="3" placeholder="구매 후기를 남겨주세요"></textarea>
                <div>
                    <button type="submit" class="btn-primary-custom">리뷰 등록</button>
                </div>
            </form>

            <!-- 댓글 목록 -->
            <div th:if="${#lists.isEmpty(replies)}" class="pdp-no-review">
                <i class="fa fa-comment-slash fa-2x"></i>
                <p>아직 리뷰가 없습니다. 첫 번째 리뷰를 남겨보세요!</p>
            </div>

            <div th:each="reply : ${replies}" class="comment-item">
                <div class="comment-avatar"
                     th:text="${reply.replyWriter != null ? #strings.substring(reply.replyWriter, 0, 1).toUpperCase() : 'U'}">
                </div>
                <div>
                    <p class="comment-author"
                       th:text="${reply.replyWriter != null ? reply.replyWriter : '익명'}"></p>
                    <div class="pdp-review-stars">
                        <i class="fa fa-star"></i><i class="fa fa-star"></i>
                        <i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i>
                    </div>
                    <p class="comment-content" th:text="${reply.replyContent}"></p>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <div th:insert="~{fragments/footer :: footer}"></div>

</div><!-- /page-wrapper -->

<script>
    /* 수량 컨트롤 */
    const qtyInput = document.getElementById('qtyInput');
    document.getElementById('qtyMinus').addEventListener('click', () => {
        if (qtyInput.value > 1) qtyInput.value--;
    });
    document.getElementById('qtyPlus').addEventListener('click', () => {
        if (qtyInput.value < 99) qtyInput.value++;
    });

    /* 유사 상품 스크롤 버튼 */
    const scrollWrapper = document.getElementById('scrollWrapper');
    const scrollLeftBtn = document.getElementById('scrollLeft');
    const scrollRightBtn = document.getElementById('scrollRight');
    const scrollDist = 680;

    scrollLeftBtn && scrollLeftBtn.addEventListener('click', () => scrollWrapper.scrollLeft -= scrollDist);
    scrollRightBtn && scrollRightBtn.addEventListener('click', () => scrollWrapper.scrollLeft += scrollDist);

    /* 찜하기 토글 */
    const wishBtn = document.querySelector('.pdp-btn-wish');
    wishBtn && wishBtn.addEventListener('click', () => {
        wishBtn.classList.toggle('wished');
    });

    /* 이미지 전환 함수 */
    function changeMainImage(thumbElement) {
        const mainImg = document.getElementById('main-pdp-image');
        const newSrc = thumbElement.querySelector('img').src;

        if (mainImg) {
            mainImg.src = newSrc;

            // 활성 상태 변경
            document.querySelectorAll('.pdp-thumbnail-item').forEach(item => {
                item.classList.remove('active');
            });
            thumbElement.classList.add('active');
        }
    }
</script>

</body>
</html>
