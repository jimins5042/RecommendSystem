<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('메인 페이지')}"></head>

<body>
<div class="page-wrapper">

    <!-- Navbar -->
    <div th:insert="~{fragments/bodyHeader :: bodyHeader}"></div>

    <!-- Search Area -->
    <div th:insert="~{fragments/searchBar :: searchBar}"></div>

    <!-- ===== 추천 상품 섹션 ===== -->
    <section class="section-wrap" th:if="${items != null}">
        <div class="container">

            <h2 class="section-title">카테고리별 쇼핑</h2>
            <p class="section-subtitle">상품을 클릭하면 해당 상품과 유사한 상품을 추천합니다.</p>

            <div class="category-tab-header">
                <button class="category-tab active" data-category="all">전체</button>
                <button class="category-tab" data-category="신발">신발</button>
                <button class="category-tab" data-category="선글라스">선글라스</button>
                <button class="category-tab" data-category="의류">의류</button>
                <button class="category-tab" data-category="가방">가방</button>
                <button class="category-tab" data-category="식음료">식음료</button>
            </div>

            <div class="row g-3 g-lg-4">
                <div class="col-6 col-md-4 col-lg-3" th:each="item : ${items}">
                    <a th:href="@{/shop/detail/{id}(id=${item.itemId})}">
                        <div class="product-card">
                            <!-- 이미지 -->
                            <div class="product-card__img-wrap" th:if="${item.imageUrl != null}">
                                <img th:src="${item.imageUrl}" th:alt="${item.itemTitle}" loading="lazy">
                            </div>
                            <div class="product-card__no-img" th:if="${item.imageUrl == null}">
                                <i class="fa fa-image fa-2x"></i>
                            </div>
                            <!-- 정보 -->
                            <div class="product-card__body">
                                <p class="product-card__title" th:text="${item.itemTitle}"></p>
                                <p class="product-card__price"
                                   th:text="'₩' + ${#numbers.formatInteger(item.itemPrice, 0, 'COMMA')}"></p>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

            <!-- 페이지네이션 -->
            <div th:insert="~{fragments/pagination :: pagination(pageDto=${pageDto})}"></div>
        </div>
    </section>

    <!-- Footer -->
    <div th:insert="~{fragments/footer :: footer}"></div>

</div><!-- /page-wrapper -->

<script>
    /* 카테고리 탭 */
    const categoryTabs = document.querySelectorAll('.category-tab');
    const urlType = new URLSearchParams(window.location.search).get('type') || 'all';

    /* 현재 URL의 type에 맞춰 active 표시 */
    categoryTabs.forEach(tab => {
        tab.classList.toggle('active', tab.dataset.category === urlType);
    });

    function loadCategory(category) {
        location.href = "/shop/list?type=" + encodeURIComponent(category) + "&page=1";
    }

    categoryTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            loadCategory(tab.dataset.category);
        });
    });

</script>

</body>
</html>
