<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('관리자 페이지')}"></head>

<body>
<div class="page-wrapper">

  <!-- Navbar -->
  <div th:insert="~{fragments/bodyHeader :: bodyHeader}"></div>

  <div class="container section-wrap">

    <!-- 상단: 제목 + 버튼 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 style="font-size: var(--font-size-2xl); font-weight: 700; color: var(--color-text);">
        상품 관리
      </h2>
      <button class="btn-primary-custom" onclick="goToAddItemPage()">
        <i class="fa fa-plus me-1"></i> 상품 등록
      </button>
    </div>

    <!-- 검색 폼 -->
    <div class="mb-4">
      <form action="#" method="get" class="search-form" style="max-width: 400px; margin: 0;">
        <input type="text" name="name" placeholder="상품명 검색">
        <button type="submit" class="btn-search">
          <i class="fa fa-search"></i>
        </button>
      </form>
    </div>

    <!-- 상품 테이블 -->
    <div style="overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--color-border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>상품명</th>
            <th>등록일</th>
            <th>가격</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${items}"
              th:onclick="'window.location.href=\'/shop/detail/' + ${item.itemId} + '\''">
            <td th:text="${item.itemId}"></td>
            <td th:text="${item.itemTitle}"></td>
            <td th:text="${item.itemDate != null ? #dates.format(item.itemDate, 'yyyy-MM-dd') : '-'}"></td>
            <td th:text="${item.itemPrice != null ? '₩' + #numbers.formatInteger(item.itemPrice, 0, 'COMMA') : '-'}"></td>
            <td onclick="event.stopPropagation()">
              <a th:href="'/shop/items/' + ${item.itemId} + '/edit'"
                 class="btn-primary-custom"
                 style="font-size: 0.75rem; padding: 6px 12px;">수정</a>
              <a th:href="'/shop/items/' + ${item.itemId} + '/delete'"
                 class="btn-secondary-custom"
                 style="font-size: 0.75rem; padding: 6px 12px;">삭제</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 페이지네이션 -->
    <nav class="shop-pagination">
      <ul class="pagination">
        <li class="page-item" th:if="${pageDto.pageNo > 9}">
          <a class="page-link" th:href="@{/shop/itemList(page=${(pageDto.pageNo/10 - 1) * 10 + 1})}">
            <i class="fa fa-chevron-left"></i>
          </a>
        </li>
        <li class="page-item"
            th:each="i : ${#numbers.sequence(pageDto.startPage, pageDto.endPage)}"
            th:classappend="${i == pageDto.pageNo} ? 'active' : ''">
          <a class="page-link" th:href="@{/shop/itemList(page=${i})}" th:text="${i}"></a>
        </li>
        <li class="page-item" th:if="${pageDto.pageNo < pageDto.totalPages}">
          <a class="page-link" th:href="@{/shop/itemList(page=${(pageDto.pageNo/10 + 1) * 10 + 1})}">
            <i class="fa fa-chevron-right"></i>
          </a>
        </li>
      </ul>
    </nav>

  </div>

  <!-- Footer -->
  <div th:insert="~{fragments/footer :: footer}"></div>

</div><!-- /page-wrapper -->

<script>
  function goToAddItemPage() {
    window.location.href = '/shop/addItemPage';
  }
</script>

</body>
</html>
