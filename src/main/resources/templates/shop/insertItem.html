<!DOCTYPE HTML>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('상품 등록')}"></head>

<body>
<div class="page-wrapper">

  <!-- Navbar -->
  <div th:insert="~{fragments/bodyHeader :: bodyHeader}"></div>

  <div class="container">
    <div class="form-card">
      <h2 class="form-title"><i class="fa fa-plus-circle me-2" style="color: var(--color-primary);"></i>상품 등록</h2>

      <form th:action="@{/shop/addItemAction}" th:object="${itemForm}" method="post" enctype="multipart/form-data">

        <!-- 상품명 -->
        <div class="mb-4">
          <label for="itemTitle">상품명</label>
          <input type="text" name="itemTitle" id="itemTitle" placeholder="상품명을 입력하세요" required>
        </div>

        <!-- 상품 설명 -->
        <div class="mb-4">
          <label for="itemContent">상품 설명</label>
          <textarea name="itemContent" id="itemContent" rows="5" placeholder="상품 설명을 입력하세요"></textarea>
        </div>

        <!-- 상품 가격 -->
        <div class="mb-4">
          <label for="itemPrice">상품 가격 (원)</label>
          <input type="number" name="itemPrice" id="itemPrice" placeholder="가격을 입력하세요 (예: 15000)" step="1" min="0">
        </div>

        <!-- 이미지 업로드 -->
        <div class="mb-4">
          <label>상품 이미지</label>
          <div class="img-upload-area" id="imgUploadArea">
            <i class="fa fa-cloud-upload-alt fa-2x mb-2" style="color: var(--color-text-muted);"></i>
            <p id="uploadLabel">클릭하여 이미지를 업로드하세요</p>
          </div>
          <input type="file" name="imgFile" id="imgFile" class="d-none" accept="image/*">
          <input type="hidden" name="palette" id="palette">
        </div>

        <!-- 제출 버튼 -->
        <div class="d-flex gap-3">
          <button type="submit" class="btn-primary-custom">등록하기</button>
          <a href="/shop/itemList" class="btn-secondary-custom" style="display: inline-block; text-align: center;">취소</a>
        </div>

      </form>
    </div>
  </div>

  <!-- Footer -->
  <div th:insert="~{fragments/footer :: footer}"></div>

</div><!-- /page-wrapper -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
<script>
  const imgFile = document.getElementById('imgFile');
  const imgUploadArea = document.getElementById('imgUploadArea');
  const uploadLabel = document.getElementById('uploadLabel');
  const paletteInput = document.getElementById('palette');
  const img = new Image();
  const colorThief = new ColorThief();

  imgUploadArea.addEventListener('click', () => imgFile.click());

  imgFile.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (!file) return;
    uploadLabel.textContent = file.name;

    const reader = new FileReader();
    reader.onload = function (e) {
      img.src = e.target.result;
      img.onload = () => {
        const palette = colorThief.getPalette(img, 5);
        paletteInput.value = JSON.stringify(palette);
      };
    };
    reader.readAsDataURL(file);
  });
</script>

</body>
</html>
